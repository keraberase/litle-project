<!DOCTYPE html>
<html>
<head>
    <title>Game Backlog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap');
 
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            background: #050510;
            color: #e0e0e0;
            font-family: 'Orbitron', Arial, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(ellipse at 20% 20%, #1a0030 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #001a30 0%, transparent 50%);
        }
 
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 100;
        }
 
        h1 {
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 1.6rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
 
        @keyframes shimmer {
            0% { background-position: 0% }
            100% { background-position: 200% }
        }
 
        .subtitle {
            text-align: center;
            font-size: 0.6rem;
            color: #555;
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-family: 'Press Start 2P', monospace;
        }
 
        .form-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #ff00ff44;
            border-radius: 4px;
            padding: 24px;
            max-width: 720px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            box-shadow: 0 0 30px #ff00ff22, inset 0 0 30px rgba(255,0,255,0.03);
        }
 
        .form-card::before {
            content: '// ADD GAME';
            position: absolute;
            top: -11px; left: 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: #ff00ff;
            background: #050510;
            padding: 0 8px;
        }
 
        .form-card input {
            flex: 1;
            min-width: 130px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 4px;
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
 
        .form-card input::placeholder { color: #444; }
        .form-card input:focus { border-color: #00ffff; box-shadow: 0 0 10px #00ffff44; }
 
        .btn-add {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff00ff, #7700ff);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 15px #ff00ff66;
        }
 
        .btn-add:hover { transform: scale(1.05); box-shadow: 0 0 25px #ff00ffaa; }
        .btn-add:active { transform: scale(0.97); }
 
        .counter {
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: #555;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .counter span { color: #00ffff; }
 
        .game-list {
            max-width: 720px;
            margin: 0 auto;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
 
        .game-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid #222;
            border-left: 3px solid #ff00ff;
            border-radius: 4px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
 
        .game-item:hover { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff22; }
        .game-item.completed { border-left-color: #00ff88; opacity: 0.7; }
        .game-item.completed:hover { border-color: #00ff88; box-shadow: 0 0 20px #00ff8822; }
 
        .game-info { flex: 1; min-width: 0; }
 
        .game-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
 
        .game-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
 
        .platform-badge {
            font-size: 0.6rem;
            color: #888;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 2px 8px;
            font-family: 'Press Start 2P', monospace;
        }
 
        .status-badge {
            font-size: 0.55rem;
            font-family: 'Press Start 2P', monospace;
            padding: 2px 8px;
            border-radius: 3px;
        }
 
        .status-planned { color: #888; border: 1px solid #333; }
        .status-completed { color: #00ff88; border: 1px solid #00ff8844; background: rgba(0,255,136,0.05); }
 
        .stars { display: flex; align-items: center; gap: 3px; margin-top: 6px; }
 
        .game-actions { display: flex; gap: 8px; flex-shrink: 0; }
 
        .btn-complete {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff8844;
            border-radius: 4px;
            padding: 7px 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
 
        .btn-complete:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 10px #00ff8844; }
 
        .btn-delete {
            background: rgba(255,50,50,0.1);
            border: 1px solid #ff333344;
            border-radius: 4px;
            padding: 7px 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            color: #ff5555;
        }
 
        .btn-delete:hover { background: rgba(255,50,50,0.2); box-shadow: 0 0 10px #ff333344; }
 
        .empty {
            text-align: center;
            color: #333;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            padding: 60px 20px;
            line-height: 2.5;
        }
        .empty span { color: #ff00ff; }
    </style>
</head>
<body>
 
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
        <symbol id="check" viewBox="0 0 24 24" fill="none">
            <polyline points="4,12 9,17 20,6" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <symbol id="star" viewBox="0 0 501.986 501.986">
            <path fill="#fbb03b" d="M287.442 42.472l42.984 87.096c5.921 11.997 17.365 20.312 30.604 22.235l96.116 13.966c33.339 4.844 46.651 45.815 22.527 69.331l-69.55 67.795c-9.58 9.338-13.951 22.792-11.69 35.978l16.419 95.728c5.695 33.204-29.157 58.526-58.976 42.849l-85.969-45.196c-11.841-6.225-25.988-6.225-37.829 0l-85.969 45.196c-29.819 15.677-64.671-9.644-58.976-42.849l16.419-95.728c2.261-13.185-2.11-26.639-11.69-35.978L22.312 235.1c-24.124-23.515-10.812-64.486 22.527-69.33l96.116-13.966c13.239-1.924 24.684-10.239 30.604-22.235l42.984-87.096c14.911-30.211 57.99-30.211 72.899-1e-3z"/>
        </symbol>
        <symbol id="close" viewBox="0 0 24 24">
            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
    </defs>
</svg>
 
<h1>GAME BACKLOG</h1>
<p class="subtitle">[ YOUR QUEST LOG ]</p>
 
<div class="form-card">
    <input id="title" placeholder="game title..."/>
    <input id="platform" placeholder="platform..."/>
    <input id="rating" placeholder="rating 1-5" type="number" min="1" max="5"/>
    <button class="btn-add" onclick="addGame()">▶ ADD</button>
</div>
 
<p class="counter" id="counter">LOADING...</p>
<ul class="game-list" id="list"></ul>
 
<script>
async function loadGames() {
    const res = await fetch('/games');
    const games = await res.json();
    const list = document.getElementById('list');
    const counter = document.getElementById('counter');
 
    const planned = games.filter(g => g.status === 'planned').length;
    const completed = games.filter(g => g.status === 'completed').length;
    counter.innerHTML = `PLANNED: <span>${planned}</span> &nbsp;|&nbsp; COMPLETED: <span>${completed}</span>`;
 
    list.innerHTML = '';
 
    if (games.length === 0) {
        list.innerHTML = '<div class="empty">NO GAMES YET<br><span>[ START YOUR BACKLOG ]</span></div>';
        return;
    }
 
    games.forEach(game => {
        const li = document.createElement('li');
        li.className = 'game-item' + (game.status === 'completed' ? ' completed' : '');
        li.innerHTML = `
            <div class="game-info">
                <div class="game-title">${game.title}</div>
                <div class="game-meta">
                    <span class="platform-badge">${game.platform || '???'}</span>
                    <span class="status-badge status-${game.status}">${game.status.toUpperCase()}</span>
                </div>
                <div class="stars">${renderStars(game.rating)}</div>
            </div>
            <div class="game-actions">
                ${game.status !== 'completed' ? `
                <button class="btn-complete" onclick="completeGame(${game.id})" title="Mark completed">
                    <svg width="18" height="18"><use href="#check"></use></svg>
                </button>` : ''}
                <button class="btn-delete" onclick="deleteGame(${game.id})" title="Delete">
                    <svg width="18" height="18"><use href="#close"></use></svg>
                </button>
                <div class="game-meta">
                <span class="platform-badge">${game.platform || '???'}</span>
                <span class="status-badge status-${game.status}">${game.status.toUpperCase()}</span>
                ${game.added_at ? `<span style="font-size:0.55rem;color:#555;font-family:monospace">ADDED: ${game.added_at}</span>` : ''}
                ${game.completed_at ? `<span style="font-size:0.55rem;color:#00ff8877;font-family:monospace">DONE: ${game.completed_at}</span>` : ''}
                </div>
            </div>
        `;
        list.appendChild(li);
    });
}
 
async function addGame() {
    const title = document.getElementById('title').value.trim();
    const platform = document.getElementById('platform').value.trim();
    const rating = parseInt(document.getElementById('rating').value);
 
    if (!title) { alert('Enter a game title!'); return; }
    if (isNaN(rating) || rating < 1 || rating > 5) { alert('Rating must be 1 to 5!'); return; }
 
    await fetch('/games', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, platform, status: 'planned', rating })
    });
 
    document.getElementById('title').value = '';
    document.getElementById('platform').value = '';
    document.getElementById('rating').value = '';
    loadGames();
}
 
async function deleteGame(id) {
    await fetch('/games/' + id, { method: 'DELETE' });
    loadGames();
}
 
async function completeGame(id) {
    await fetch('/games/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'completed' })
    });
    loadGames();
}
 
function renderStars(rating) {
    if (!rating) return '<span style="color:#333;font-size:0.65rem;font-family:monospace">NOT RATED</span>';
    let stars = '';
    for (let i = 0; i < 5; i++) {
        stars += `<svg width="14" height="14" style="opacity:${i < rating ? '1' : '0.1'}"><use href="#star"></use></svg>`;
    }
    return stars;
}
 
loadGames();
</script>
</body>
</html>
