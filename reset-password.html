<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Game Backlog</title>
    <style>
        body {
            background: #0a0a0f;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h2 { color: #ff00ff; letter-spacing: 3px; margin-bottom: 8px; }
        p  { color: #666; font-size: 0.8rem; margin-bottom: 24px; }
        input {
            width: 100%;
            box-sizing: border-box;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #eee;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        input:focus { outline: none; border-color: #ff00ff; }
        button {
            width: 100%;
            padding: 12px;
            background: #ff00ff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
        }
        button:hover { background: #cc00cc; }
        #msg { margin-top: 16px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>RESET PASSWORD</h2>
    <p>Enter your new password below.<br>The link expires after 15 minutes.</p>

    <input type="password" id="newPassword" placeholder="NEW PASSWORD">
    <input type="password" id="confirmPassword" placeholder="CONFIRM PASSWORD">
    <button id="resetBtn">▶ SET NEW PASSWORD</button>
    <div id="msg"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const msg = document.getElementById('msg');

    if (!token) {
        msg.style.color = '#ff5555';
        msg.textContent = 'Invalid or missing reset token.';
        document.getElementById('resetBtn').disabled = true;
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || newPassword.length < 6) {
            msg.style.color = '#ff5555';
            msg.textContent = 'Password must be at least 6 characters.';
            return;
        }

        if (newPassword !== confirmPassword) {
            msg.style.color = '#ff5555';
            msg.textContent = 'Passwords do not match.';
            return;
        }

        const response = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword }) 
        });

        const data = await response.json();

        if (response.ok) {
            msg.style.color = '#00ff88';
            msg.textContent = '✓ Password updated! Redirecting...';
            setTimeout(() => window.location.href = '/', 1500);
        } else {
            msg.style.color = '#ff5555';
            msg.textContent = data.error || 'Something went wrong.';
        }
    });
</script>
</body>
</html>
